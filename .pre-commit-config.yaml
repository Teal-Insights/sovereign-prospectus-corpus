repos:
  # === LINTING + FORMATTING (auto-fix on failure) ===
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # === TYPE CHECKING ===
  - repo: local
    hooks:
      - id: pyright
        name: pyright type checking
        entry: uv run pyright src/
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # === TESTS ===
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest -x -q        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

  # === SAFETY CHECKS ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: detect-private-key