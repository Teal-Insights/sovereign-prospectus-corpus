# Runtime configuration for the sovereign prospectus corpus pipeline
# Contact info for API User-Agent headers comes from .env (see .env.example)

[parser]
default = "pymupdf"  # Switch to "docling" after Monday

[nsm]
delay_api = 1.0
delay_download = 1.0
max_retries = 5
backoff_factor = 0.5
timeout = 60

[nsm.circuit_breaker]
consecutive_failures_skip = 5
rate_limit_sleep_seconds = 660
total_failures_abort = 10

[edgar]
delay = 0.2
max_retries = 3
timeout = 60
[edgar.circuit_breaker]
consecutive_failures_skip = 5
rate_limit_sleep_seconds = 660
total_failures_abort = 10

[pdip]
delay = 1.0
max_retries = 3
timeout = 60

[paths]
manifests_dir = "data/manifests"
original_dir = "data/original"
parsed_dir = "data/parsed"
extracted_dir = "data/extracted"
api_responses_dir = "data/api_responses"
db_path = "data/db/corpus.duckdb"
telemetry_dir = "data/telemetry"
config_dir = "data/config"