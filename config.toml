# Runtime configuration for the sovereign prospectus corpus pipeline
# Contact info for API User-Agent headers comes from .env (see .env.example)

[parser]
default = "docling"

[nsm]
delay_api = 1.0
delay_download = 1.0
max_retries = 5
backoff_factor = 0.5
timeout = 60

[nsm.circuit_breaker]
total_failures_abort = 10

[edgar]
delay = 0.2
max_retries = 3
timeout = 60
[edgar.circuit_breaker]
consecutive_failures_skip = 5
rate_limit_sleep_seconds = 660
total_failures_abort = 10

[pdip]
delay = 1.0
max_retries = 3
timeout = 60

[pdip.circuit_breaker]
total_failures_abort = 10

[luxse]
delay = 1.0
max_retries = 3
timeout = 60

[luxse.circuit_breaker]
total_failures_abort = 10

[pdip_annotations]
delay = 1.0
max_retries = 3
timeout = 60

[pdip_annotations.circuit_breaker]
consecutive_failures_pause = 3
consecutive_failures_abort = 8

[pdip_annotations.zero_clause_gate]
# Early abort: if > early_abort_count of first early_abort_window docs are zero-clause
# Set high because inventory CSV clusters Venezuela zero-clause docs at the start
early_abort_count = 15
early_abort_window = 20
# Rate abort: after rate_min_docs, abort if rate > rate_threshold
# Baseline: 40/162 = 24.7%. Set to 50% to allow for ordering effects.
rate_threshold = 0.50
rate_min_docs = 50

[paths]
manifests_dir = "data/manifests"
original_dir = "data/original"
parsed_dir = "data/parsed"
extracted_dir = "data/extracted"
api_responses_dir = "data/api_responses"
db_path = "data/db/corpus.duckdb"
telemetry_dir = "data/telemetry"
config_dir = "data/config"